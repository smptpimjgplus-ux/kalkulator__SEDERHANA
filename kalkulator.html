<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Sederhana</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
            font-family: Arial, sans-serif;
        }
        .kalkulator {
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 250px;
        }
        #layar {
            width: 100%;
            height: 40px;
            background-color: #e9ecef;
            text-align: right;
            padding: 5px;
            font-size: 20px;
            box-sizing: border-box;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .tombols {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        button {
            padding: 15px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #e0e0e0;
            transition: 0.2s;
        }
        button:hover { background-color: #d4d4d4; }
        button.operator { background-color: #ff9500; color: white; }
        button.operator:hover { background-color: #e08500; }
        button.clear { background-color: #ff3b30; color: white; }
        button.clear:hover { background-color: #d32f2f; }
    </style>
</head>
<body>

<div class="kalkulator">
    <input type="text" id="layar" readonly>
    <div class="tombols">
        <button class="clear" onclick="clearLayar()">C</button>
        <button onclick="tambahKarakter('/')" class="operator">/</button>
        <button onclick="tambahKarakter('*')" class="operator">*</button>
        <button onclick="tambahKarakter('-')" class="operator">-</button>
        
        <button onclick="tambahKarakter('7')">7</button>
        <button onclick="tambahKarakter('8')">8</button>
        <button onclick="tambahKarakter('9')">9</button>
        <button onclick="tambahKarakter('+')" class="operator">+</button>
        
        <button onclick="tambahKarakter('4')">4</button>
        <button onclick="tambahKarakter('5')">5</button>
        <button onclick="tambahKarakter('6')">6</button>
        <button onclick="hitung()" class="operator" style="grid-row: span 2; height: 100%;">=</button>
        
        <button onclick="tambahKarakter('1')">1</button>
        <button onclick="tambahKarakter('2')">2</button>
        <button onclick="tambahKarakter('3')">3</button>
        
        <button onclick="tambahKarakter('0')" style="grid-column: span 2;">0</button>
        <button onclick="tambahKarakter('.')">.</button>
    </div>
</div>

<script>
    const layar = document.getElementById('layar');

    function tambahKarakter(karakter) {
        layar.value += karakter;
    }

    function clearLayar() {
        layar.value = '';
    }

    function hitung() {
        try {
            // eval() digunakan untuk mengeksekusi string matematika secara langsung
            layar.value = eval(layar.value);
        } catch (error) {
            layar.value = 'Error';
        }
    }
</script>

</body>
</html>
